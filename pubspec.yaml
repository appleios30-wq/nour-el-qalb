name: nour_el_qalb
description: "تطبيق نور قلبك - أذكار مطلقة مع تأثيرات نيون متوهجة"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # للرسوميات والتأثيرات
  flutter_animate: ^4.3.0
  confetti: ^0.7.0
  shimmer: ^3.0.0
  
  # للحفظ المحلي
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # للألوان والتصميم
  google_fonts: ^6.1.0
  
  # للتنقل
  flutter_staggered_animations: ^1.1.1
  
  # للصور والرسومات
  flutter_svg: ^2.0.9
  
  # للأيقونات
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0a0a1a"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
